services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: ${DATABASE_USER:-app_user}
      POSTGRES_PASSWORD: ${DATABASE_PASS:-app_pass}
      POSTGRES_DB: ${DATABASE_NAME:-servicentro_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-app_user}
      DATABASE_PASS: ${DATABASE_PASS:-app_pass}
      DATABASE_NAME: ${DATABASE_NAME:-servicentro_db}
      TYPEORM_SYNC: ${TYPEORM_SYNC:-false}
      TYPEORM_LOGGING: ${TYPEORM_LOGGING:-false}
      JWT_SECRETO: ${JWT_SECRETO:-cambia-este-secreto}
      JWT_EXPIRACION: ${JWT_EXPIRACION:-3600}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
